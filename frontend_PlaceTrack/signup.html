<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PlaceTrack</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --accent-light: #dbeafe;
            --success: #10b981;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }
        .card {
            background: var(--card);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.09);
            padding: 50px 45px;
        }
        .brand-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: 6px;
        }
        .brand-dot { color: var(--accent); }
        .page-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            margin-top: 24px;
            margin-bottom: 4px;
        }
        .page-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 28px; }

        .role-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border: 1.5px solid var(--border);
            margin-bottom: 28px;
        }
        .role-tab {
            padding: 11px;
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            cursor: pointer;
            color: var(--muted);
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }
        .role-tab:first-child { border-right: 1.5px solid var(--border); }
        .role-tab.active { background: var(--primary); color: #fff; }

        .form-group { margin-bottom: 18px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            font-weight: 700;
            margin-bottom: 7px;
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            font-size: 14px;
            color: var(--text);
            background: #fafafa;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            -webkit-appearance: none;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); background: #fff; }
        .btn-signup {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-top: 10px;
            transition: 0.25s;
            font-family: 'Inter', sans-serif;
        }
        .btn-signup:hover { background: var(--accent); }
        .footer-text {
            text-align: center;
            margin-top: 22px;
            font-size: 13px;
            color: var(--muted);
        }
        .footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 20px;
            border-left: 3px solid #dc2626;
        }
        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }
        /* Student-only fields hidden for trainer */
        .student-only { display: block; }
        .trainer-only { display: none; }
        .show-trainer .student-only { display: none; }
        .show-trainer .trainer-only { display: block; }
        @media(max-width:480px){
            .card { padding: 32px 22px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="brand-name">Place<span class="brand-dot">Track</span></div>
        <div class="page-title">Create Account</div>
        <div class="page-sub">Join the placement management platform</div>

        <div class="role-tabs">
            <button class="role-tab active" onclick="setRole(this,'student')">Student</button>
            <button class="role-tab" onclick="setRole(this,'trainer')">Trainer</button>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/signup" method="post" id="signup-form">
            <input type="hidden" name="role" id="role-input" value="student">

            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" placeholder="Ravi" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" placeholder="Sharma" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@college.edu" required>
            </div>

            <!-- Student-specific -->
            <div class="student-only">
                <div class="form-row">
                    <div class="form-group">
                        <label>College / Institute</label>
                        <input type="text" name="college" placeholder="MIT Pune">
                    </div>
                    <div class="form-group">
                        <label>Batch Year</label>
                        <select name="batch_year">
                            <option>2025</option>
                            <option>2026</option>
                            <option>2027</option>
                            <option>2028</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Branch / Stream</label>
                    <select name="branch">
                        <option value="">Select branch</option>
                        <option>Computer Science</option>
                        <option>Information Technology</option>
                        <option>Electronics</option>
                        <option>Mechanical</option>
                        <option>Civil</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <!-- Trainer-specific -->
            <div class="trainer-only">
                <div class="form-group">
                    <label>Specialization</label>
                    <select name="specialization">
                        <option value="">Select area</option>
                        <option>Full Stack Development</option>
                        <option>Data Science</option>
                        <option>Cloud & DevOps</option>
                        <option>Aptitude & Soft Skills</option>
                        <option>Core Java / Python</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" name="employee_id" placeholder="TRN-2024-001">
                </div>
            </div>

            <div class="divider"></div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 8 characters" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-signup">Create Account</button>
        </form>

        <div class="footer-text">
            Already registered? <a href="/login">Sign in</a>
        </div>
    </div>

    <script>
        function setRole(el, role) {
            document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('role-input').value = role;
            const form = document.getElementById('signup-form');
            if(role === 'trainer') form.classList.add('show-trainer');
            else form.classList.remove('show-trainer');
        }
    </script>
</body>
</html>
