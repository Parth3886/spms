<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PlaceTrack</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --accent-light: #dbeafe;
            --success: #10b981;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .split {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 520px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.12);
        }
        .panel-left {
            background: var(--primary);
            width: 42%;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .panel-left::before {
            content: '';
            position: absolute;
            top: -80px; right: -80px;
            width: 240px; height: 240px;
            border-radius: 50%;
            background: rgba(59,130,246,0.15);
        }
        .panel-left::after {
            content: '';
            position: absolute;
            bottom: -60px; left: -60px;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: rgba(16,185,129,0.1);
        }
        .brand { position: relative; z-index: 1; }
        .brand-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .brand-dot { color: var(--accent); }
        .brand-sub {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }
        .panel-stats { position: relative; z-index: 1; }
        .stat-item { margin-bottom: 24px; }
        .stat-num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }
        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .stat-bar {
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .stat-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent);
        }
        .panel-right {
            background: var(--card);
            flex: 1;
            padding: 50px 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .page-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
        .role-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
        }
        .role-btn {
            flex: 1;
            padding: 9px 0;
            border: 1.5px solid var(--border);
            background: none;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }
        .role-btn.active {
            border-color: var(--accent);
            background: var(--accent-light);
            color: var(--accent);
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            font-weight: 700;
            margin-bottom: 8px;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 13px 15px;
            border: 1.5px solid var(--border);
            font-size: 14px;
            color: var(--text);
            background: #fafafa;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        input:focus { outline: none; border-color: var(--accent); background: #fff; }
        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-top: 8px;
            transition: 0.25s;
            font-family: 'Inter', sans-serif;
        }
        .btn-login:hover { background: var(--accent); }
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
        }
        .footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 13px 15px;
            font-size: 13px;
            margin-bottom: 22px;
            border-left: 3px solid #dc2626;
        }
        @media(max-width:640px){
            .split { flex-direction: column; max-width: 100%; min-height: auto; }
            .panel-left { width: 100%; padding: 30px; }
            .panel-stats { display: flex; gap: 20px; }
            .stat-item { margin-bottom: 0; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="split">
        <div class="panel-left">
            <div class="brand">
                <div class="brand-name">Place<span class="brand-dot">Track</span></div>
                <div class="brand-sub">Placement Management</div>
            </div>
            <div class="panel-stats">
                <div class="stat-item">
                    <div class="stat-num">94%</div>
                    <div class="stat-label">Placement Rate</div>
                    <div class="stat-bar"><div class="stat-fill" style="width:94%"></div></div>
                </div>
                <div class="stat-item">
                    <div class="stat-num">1.2k</div>
                    <div class="stat-label">Active Students</div>
                    <div class="stat-bar"><div class="stat-fill" style="width:78%;background:#10b981"></div></div>
                </div>
                <div class="stat-item">
                    <div class="stat-num">48</div>
                    <div class="stat-label">Partner Companies</div>
                    <div class="stat-bar"><div class="stat-fill" style="width:60%;background:#f59e0b"></div></div>
                </div>
            </div>
        </div>

        <div class="panel-right">
            <div class="page-title">Welcome back</div>
            <div class="page-sub">Sign in to your PlaceTrack account</div>

            <div class="role-selector">
                <button class="role-btn active" onclick="setRole(this,'admin')">Admin</button>
                <button class="role-btn" onclick="setRole(this,'trainer')">Trainer</button>
                <button class="role-btn" onclick="setRole(this,'student')">Student</button>
            </div>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form action="/login" method="post">
                <input type="hidden" name="role" id="role-input" value="admin">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="you@institute.edu" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="footer-text">
                New student? <a href="/signup">Register here</a>
            </div>
        </div>
    </div>

    <script>
        function setRole(el, role) {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('role-input').value = role;
        }
    </script>
</body>
</html>
